version: "3.8"

# ===========================================================
# AutoSales AI - Development Docker Compose Override
# ===========================================================
# Usage:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.dev.yml up
# ===========================================================

services:
  # ---------------------------------------------------------
  # PostgreSQL (same as production)
  # ---------------------------------------------------------
  db:
    ports:
      - "5432:5432"

  # ---------------------------------------------------------
  # Next.js - Development Mode with Hot Reload
  # ---------------------------------------------------------
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      target: builder
    container_name: autosales-web-dev
    command: pnpm dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - ../packages/web:/app/packages/web
      - ../packages/web/node_modules:/app/packages/web/node_modules
      - /app/packages/web/.next

  # ---------------------------------------------------------
  # Python Agent - Development Mode with Auto-Reload
  # ---------------------------------------------------------
  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    container_name: autosales-agent-dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - AGENT_LOG_LEVEL=DEBUG
    volumes:
      - ../packages/agent:/app/packages/agent
      - ../agent-config:/app/agent-config

  # ---------------------------------------------------------
  # pgAdmin - Database Management UI
  # ---------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: autosales-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@autosales.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - autosales-network

volumes:
  pgadmin_data:
    driver: local
