services:
  db:
    ports:
      - "5432:5432"

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      target: deps
    container_name: autosales-web-dev
    working_dir: /app
    command: >
      sh -lc "pnpm install --frozen-lockfile &&
      pnpm --filter autosales-web dev --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - DATABASE_URL=postgresql://autosales:${DB_PASSWORD:-change_me_in_production}@db:5432/autosales
      - AGENT_API_URL=http://agent:8000
    volumes:
      - ..:/app
      - web_node_modules:/app/node_modules
      - web_package_node_modules:/app/packages/web/node_modules

  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    container_name: autosales-agent-dev
    working_dir: /app/packages/agent
    command: >
      sh -lc "pip install --no-cache-dir -e '.[dev]' &&
      uvicorn autosales.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      - AGENT_LOG_LEVEL=DEBUG
      - DATABASE_URL=postgresql://autosales:${DB_PASSWORD:-change_me_in_production}@db:5432/autosales
      - AGENT_CONFIG_DIR=/app/agent-config
    volumes:
      - ..:/app

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: autosales-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@autosales.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - autosales-network

volumes:
  pgadmin_data:
    driver: local
  web_node_modules:
    driver: local
  web_package_node_modules:
    driver: local
