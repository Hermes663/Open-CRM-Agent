version: "3.8"

# ===========================================================
# AutoSales AI - Production Docker Compose
# ===========================================================
# Usage:
#   docker compose up -d
#   docker compose logs -f
#   docker compose down
# ===========================================================

services:
  # ---------------------------------------------------------
  # PostgreSQL with pgvector extension
  # ---------------------------------------------------------
  db:
    image: pgvector/pgvector:pg16
    container_name: autosales-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: autosales
      POSTGRES_USER: autosales
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autosales -d autosales"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autosales-network

  # ---------------------------------------------------------
  # Next.js Web Application
  # ---------------------------------------------------------
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: autosales-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://autosales:${DB_PASSWORD:-change_me_in_production}@db:5432/autosales
      - AGENT_API_URL=http://agent:8000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - autosales-network

  # ---------------------------------------------------------
  # Python FastAPI Agent Service
  # ---------------------------------------------------------
  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    container_name: autosales-agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql://autosales:${DB_PASSWORD:-change_me_in_production}@db:5432/autosales
      - AGENT_CONFIG_DIR=/app/agent-config
    volumes:
      - ../agent-config:/app/agent-config:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - autosales-network

volumes:
  pgdata:
    driver: local

networks:
  autosales-network:
    driver: bridge
